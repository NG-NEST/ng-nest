<div class="example-container">
  <h3>Using Fixed Units (px)</h3>
  <div class="splitter1">
    <x-splitter>
      <x-splitter-panel [size]="'300px'" [min]="'200px'">
        <div class="panel-content">Left Panel (default 300px)</div>
      </x-splitter-panel>
      <x-splitter-bar></x-splitter-bar>
      <x-splitter-panel [min]="'100px'">
        <div class="panel-content">Right Panel (min 100px)</div>
      </x-splitter-panel>
    </x-splitter>
  </div>

  <h3 style="margin-top: 20px">Using rem Units</h3>
  <div class="splitter2">
    <x-splitter direction="vertical">
      <x-splitter-panel [size]="'15rem'" [min]="'8rem'">
        <div class="panel-content">Top Panel (default 15rem)</div>
      </x-splitter-panel>
      <x-splitter-bar></x-splitter-bar>
      <x-splitter-panel [min]="'2rem'">
        <div class="panel-content">Bottom Panel (auto fill)</div>
      </x-splitter-panel>
    </x-splitter>
  </div>
</div>
