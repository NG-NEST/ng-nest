<div class="example-container">
  <h3>使用固定单位（px）</h3>
  <div class="splitter1">
    <x-splitter>
      <x-splitter-panel [size]="'300px'" [min]="'200px'">
        <div class="panel-content">左侧面板 (默认 300px)</div>
      </x-splitter-panel>
      <x-splitter-bar></x-splitter-bar>
      <x-splitter-panel [min]="'100px'">
        <div class="panel-content">右侧面板 (最小 100px)</div>
      </x-splitter-panel>
    </x-splitter>
  </div>

  <h3 style="margin-top: 20px">使用 rem 单位</h3>
  <div class="splitter2">
    <x-splitter direction="vertical">
      <x-splitter-panel [size]="'15rem'" [min]="'8rem'">
        <div class="panel-content">上方面板 (默认 15rem)</div>
      </x-splitter-panel>
      <x-splitter-bar></x-splitter-bar>
      <x-splitter-panel [min]="'2rem'">
        <div class="panel-content">下方面板 (自动填充)</div>
      </x-splitter-panel>
    </x-splitter>
  </div>
</div>
