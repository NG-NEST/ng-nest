<div class="example-container">
  <h3>Small 尺寸</h3>
  <img
    #img1
    src="https://ngnest.com/static/docs/21.0.10/course/rbac/1-introduction/demo/1__ng-nest-admin/light.png"
    alt="右键点击图片"
    width="100%"
  />
  <x-contextmenu [target]="img1" [data]="data()" size="small" (nodeClick)="onNodeClick($event)"></x-contextmenu>
</div>
