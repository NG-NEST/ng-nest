<div class="example-container">
  <h3>启用状态 (默认)</h3>
  <img
    #img
    src="https://ngnest.com/static/docs/21.0.10/course/rbac/1-introduction/demo/1__ng-nest-admin/light.png"
    alt="右键点击图片"
    width="100%"
  />
  <x-contextmenu [target]="img" [data]="data()" [disabled]="false" (nodeClick)="onNodeClick($event)" />
  <p>✅ 可以正常显示右键菜单</p>
</div>

<div class="example-container">
  <h3>禁用状态</h3>
  <img
    #img2
    src="https://ngnest.com/static/docs/21.0.10/course/rbac/1-introduction/demo/1__ng-nest-admin/light.png"
    alt="右键点击图片"
    width="100%"
  />
  <x-contextmenu [target]="img2" [data]="data()" [disabled]="true" (nodeClick)="onNodeClick($event)" />
  <p>❌ 右键菜单已被禁用,将显示浏览器默认菜单</p>
</div>
