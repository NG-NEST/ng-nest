<div class="example-container">
  <h3>Custom Width (200px)</h3>
  <img
    #img
    src="https://ngnest.com/static/docs/21.0.10/course/rbac/1-introduction/demo/1__ng-nest-admin/light.png"
    alt="Right click image"
    width="100%"
  />
  <x-contextmenu [target]="imgElement()" [data]="data()" portalWidth="200px" (nodeClick)="onNodeClick($event)" />
</div>
